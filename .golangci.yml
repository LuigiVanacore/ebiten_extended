run:
  timeout: 5m
  modules-download-mode: readonly
  build-tags: []
  skip-dirs:
    - example

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - deadcode  # deprecated, replaced by unused

linters-settings:
  govet:
    check-shadowing: true
  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # test helpers may intentionally ignore errors
